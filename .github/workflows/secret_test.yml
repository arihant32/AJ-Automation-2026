name: Secret Test

on:
  workflow_dispatch:

jobs:
  test-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        env:
          MY_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          if [ -z "$MY_SECRET" ]; then
            echo "❌ Secret not found!"
          else
            echo "✅ Secret loaded successfully (value hidden for security)"
          fi
